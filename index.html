<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Калькулятор</title>
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #efefea;
    --text: #1a1a1a;
    --text2: #888;
    --accent: #2d6be4;
    --btn-bg: #e8e8e3;
    --btn-op: #d4d4cf;
    --btn-eq: #2d6be4;
    --shadow: rgba(0,0,0,0.08);
  }

  html, body {
    height: 100%;
    font-family: 'Courier New', monospace;
    background: var(--bg);
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ===== CALCULATOR ===== */
  #calc-screen {
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  .calc-display {
    flex: 1;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--btn-op);
    min-height: 160px;
    position: relative;
  }

  .calc-history {
    font-size: 15px;
    color: var(--text2);
    text-align: right;
    min-height: 22px;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .calc-value {
    font-size: 52px;
    font-weight: 300;
    color: var(--text);
    text-align: right;
    letter-spacing: -1px;
    line-height: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Secret tap zone - top-left corner of display, invisible */
  .secret-zone {
    position: absolute;
    top: 0; left: 0;
    width: 60px; height: 60px;
    z-index: 10;
  }

  .calc-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--btn-op);
    flex-shrink: 0;
  }

  .calc-btn {
    background: var(--btn-bg);
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    padding: 0;
    height: 72px;
    cursor: pointer;
    transition: background 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .calc-btn:active { background: #d0d0cb; }
  .calc-btn.op { background: var(--btn-op); color: var(--accent); font-size: 20px; }
  .calc-btn.op:active { background: #c4c4bf; }
  .calc-btn.eq { background: var(--btn-eq); color: #fff; font-size: 24px; }
  .calc-btn.eq:active { background: #1f56c4; }
  .calc-btn.wide { grid-column: span 2; }
  .calc-btn.func { background: #e0e0db; color: var(--text2); font-size: 16px; }

  /* ===== GAME SCREEN ===== */
  #game-screen {
    display: none;
    height: 100vh;
    flex-direction: column;
    background: #0f0f1a;
    color: #fff;
    font-family: 'Courier New', monospace;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a;
    flex-shrink: 0;
  }

  .game-title {
    font-size: 14px;
    letter-spacing: 3px;
    color: #7b8cde;
    text-transform: uppercase;
  }

  .game-score {
    font-size: 13px;
    color: #4ecdc4;
    letter-spacing: 1px;
  }

  /* Back button - looks like an inconspicuous icon */
  .back-btn {
    background: none;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    color: #7b8cde;
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    letter-spacing: 1px;
    font-family: 'Courier New', monospace;
  }

  .back-btn:active { background: #2a2a4a; }

  /* SNAKE GAME */
  #game-canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    padding: 8px;
  }

  #gameCanvas {
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    display: block;
    touch-action: none;
  }

  .game-controls {
    display: grid;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(2, 56px);
    gap: 6px;
    margin-top: 4px;
  }

  .d-btn {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    color: #7b8cde;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .d-btn:active { background: #2a2a4a; }
  .d-btn.up    { grid-column: 2; grid-row: 1; }
  .d-btn.left  { grid-column: 1; grid-row: 2; }
  .d-btn.down  { grid-column: 2; grid-row: 2; }
  .d-btn.right { grid-column: 3; grid-row: 2; }

  /* Overlay on game over */
  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 20;
  }

  .overlay.show { display: flex; }

  .overlay-text {
    font-size: 28px;
    letter-spacing: 2px;
    color: #fff;
  }

  .overlay-sub {
    font-size: 14px;
    color: #7b8cde;
    letter-spacing: 1px;
  }

  .play-btn {
    background: #2d6be4;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    padding: 12px 32px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* Swipe hint */
  .swipe-hint {
    font-size: 11px;
    color: #3a3a5a;
    letter-spacing: 1px;
    text-align: center;
  }

  /* Secret tap counter indicator (invisible to others) */
  #tap-indicator {
    position: absolute;
    top: 8px; left: 8px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: transparent;
    transition: background 0.15s;
    pointer-events: none;
  }
  #tap-indicator.flash { background: #2d6be4; }

  #game-screen { position: relative; }
  .game-overlay-wrap { position: absolute; inset: 0; pointer-events: none; z-index: 15; }
  .game-overlay-wrap.active { pointer-events: all; }
</style>
</head>
<body>

<!-- CALCULATOR -->
<div id="calc-screen">
  <div class="calc-display">
    <div id="tap-indicator"></div>
    <!-- Secret zone: tap 3 times fast in top-left corner -->
    <div class="secret-zone" id="secretZone"></div>
    <div class="calc-history" id="history"></div>
    <div class="calc-value" id="display">0</div>
  </div>
  <div class="calc-grid">
    <button class="calc-btn func" onclick="calcFunc('AC')">AC</button>
    <button class="calc-btn func" onclick="calcFunc('+/-')">+/−</button>
    <button class="calc-btn func" onclick="calcFunc('%')">%</button>
    <button class="calc-btn op"   onclick="calcOp('÷')">÷</button>

    <button class="calc-btn" onclick="calcNum('7')">7</button>
    <button class="calc-btn" onclick="calcNum('8')">8</button>
    <button class="calc-btn" onclick="calcNum('9')">9</button>
    <button class="calc-btn op"   onclick="calcOp('×')">×</button>

    <button class="calc-btn" onclick="calcNum('4')">4</button>
    <button class="calc-btn" onclick="calcNum('5')">5</button>
    <button class="calc-btn" onclick="calcNum('6')">6</button>
    <button class="calc-btn op"   onclick="calcOp('−')">−</button>

    <button class="calc-btn" onclick="calcNum('1')">1</button>
    <button class="calc-btn" onclick="calcNum('2')">2</button>
    <button class="calc-btn" onclick="calcNum('3')">3</button>
    <button class="calc-btn op"   onclick="calcOp('+')">+</button>

    <button class="calc-btn wide" onclick="calcNum('0')">0</button>
    <button class="calc-btn" onclick="calcNum('.')">.</button>
    <button class="calc-btn eq"   onclick="calcEqual()">=</button>
  </div>
</div>

<!-- GAME -->
<div id="game-screen">
  <div class="game-header">
    <div class="game-title">SNAKE</div>
    <div class="game-score">Punkte: <span id="scoreDisp">0</span></div>
    <!-- Back button: tap to return to calculator -->
    <button class="back-btn" id="backBtn" onclick="goToCalc()">← Close</button>
  </div>

  <div id="game-canvas-wrap">
    <canvas id="gameCanvas"></canvas>
    <div class="swipe-hint">Swipe zum Bewegen</div>
    <div class="game-controls">
      <button class="d-btn up"    onclick="setDir(0,-1)">↑</button>
      <button class="d-btn left"  onclick="setDir(-1,0)">←</button>
      <button class="d-btn down"  onclick="setDir(0,1)">↓</button>
      <button class="d-btn right" onclick="setDir(1,0)">→</button>
    </div>
  </div>

  <div class="game-overlay-wrap active" id="gameOverlayWrap">
    <div class="overlay show" id="gameOverlay">
      <div class="overlay-text">SNAKE</div>
      <div class="overlay-sub">Classic</div>
      <button class="play-btn" onclick="startGame()">PLAY</button>
    </div>
  </div>
</div>

<script>
// ===== SECRET UNLOCK =====
let tapCount = 0;
let tapTimer = null;
const TAPS_NEEDED = 3;

document.getElementById('secretZone').addEventListener('touchstart', handleSecretTap);
document.getElementById('secretZone').addEventListener('click', handleSecretTap);

function handleSecretTap(e) {
  e.preventDefault();
  e.stopPropagation();
  tapCount++;

  const ind = document.getElementById('tap-indicator');
  ind.classList.add('flash');
  setTimeout(() => ind.classList.remove('flash'), 150);

  if (tapCount >= TAPS_NEEDED) {
    tapCount = 0;
    clearTimeout(tapTimer);
    openGame();
    return;
  }

  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapCount = 0; }, 800);
}

function openGame() {
  document.getElementById('calc-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
}

function goToCalc() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('calc-screen').style.display = 'flex';
  pauseGame();
}

// ===== CALCULATOR LOGIC =====
let calcState = { value: '0', prev: null, op: null, newNum: true };

function updateDisplay() {
  const d = document.getElementById('display');
  let v = calcState.value;
  if (v.length > 10) v = parseFloat(v).toExponential(4);
  d.textContent = v;
  const fontSize = v.length > 8 ? '36px' : v.length > 6 ? '44px' : '52px';
  d.style.fontSize = fontSize;
}

function calcNum(n) {
  if (n === '.' && calcState.value.includes('.')) return;
  if (calcState.newNum) {
    calcState.value = n === '.' ? '0.' : n;
    calcState.newNum = false;
  } else {
    if (calcState.value === '0' && n !== '.') calcState.value = n;
    else calcState.value += n;
  }
  updateDisplay();
}

function calcOp(op) {
  if (calcState.op && !calcState.newNum) calcEqual(true);
  calcState.prev = calcState.value;
  calcState.op = op;
  calcState.newNum = true;
  document.getElementById('history').textContent = calcState.prev + ' ' + op;
}

function calcEqual(chain) {
  if (!calcState.op || !calcState.prev) return;
  const a = parseFloat(calcState.prev);
  const b = parseFloat(calcState.value);
  let r;
  if (calcState.op === '+') r = a + b;
  else if (calcState.op === '−') r = a - b;
  else if (calcState.op === '×') r = a * b;
  else if (calcState.op === '÷') r = b === 0 ? 'Error' : a / b;
  const rs = typeof r === 'number' ? ('' + parseFloat(r.toFixed(10))) : r;
  if (!chain) {
    document.getElementById('history').textContent = calcState.prev + ' ' + calcState.op + ' ' + calcState.value + ' =';
    calcState.op = null;
    calcState.prev = null;
  }
  calcState.value = rs;
  calcState.newNum = true;
  updateDisplay();
}

function calcFunc(fn) {
  if (fn === 'AC') {
    calcState = { value: '0', prev: null, op: null, newNum: true };
    document.getElementById('history').textContent = '';
  } else if (fn === '+/-') {
    calcState.value = '' + (parseFloat(calcState.value) * -1);
  } else if (fn === '%') {
    calcState.value = '' + (parseFloat(calcState.value) / 100);
  }
  updateDisplay();
}

// ===== SNAKE GAME =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('game-canvas-wrap');
  const controlsH = 56*2 + 6 + 12 + 16 + 20 + 14; // controls + gaps + hints
  const headerH = 48;
  const avail = Math.min(wrap.clientWidth - 16, window.innerHeight - headerH - controlsH - 16);
  const size = Math.floor(avail / 20) * 20;
  canvas.width = size;
  canvas.height = size;
  CELL = size / 20;
}

let CELL = 16;
let snake, dir, nextDir, food, score, gameLoop, running;

function startGame() {
  resizeCanvas();
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  running = true;
  placeFood();
  document.getElementById('gameOverlay').classList.remove('show');
  document.getElementById('gameOverlayWrap').classList.remove('active');
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, 140);
}

function pauseGame() {
  running = false;
  clearInterval(gameLoop);
}

function placeFood() {
  do {
    food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
  } while (snake.some(s => s.x===food.x && s.y===food.y));
}

function setDir(dx, dy) {
  if (dx === -dir.x && dy === -dir.y) return;
  nextDir = {x:dx, y:dy};
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
  if (head.x<0||head.x>=20||head.y<0||head.y>=20||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++;
    document.getElementById('scoreDisp').textContent = score;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grid dots
  ctx.fillStyle = '#1a1a2e';
  for(let x=0;x<20;x++) for(let y=0;y<20;y++) {
    ctx.fillRect(x*CELL+CELL/2-1, y*CELL+CELL/2-1, 2, 2);
  }

  // Food
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-1, 0, Math.PI*2);
  ctx.fill();

  // Snake
  snake.forEach((s,i) => {
    const alpha = 1 - (i/snake.length)*0.4;
    ctx.fillStyle = i===0 ? '#4ecdc4' : `rgba(78,205,196,${alpha})`;
    const pad = i===0 ? 1 : 2;
    ctx.fillRect(s.x*CELL+pad, s.y*CELL+pad, CELL-pad*2, CELL-pad*2);
  });
}

function gameOver() {
  clearInterval(gameLoop);
  running = false;
  const overlay = document.getElementById('gameOverlay');
  overlay.innerHTML = `
    <div class="overlay-text">GAME OVER</div>
    <div class="overlay-sub">очки: ${score}</div>
    <button class="play-btn" onclick="startGame()">ЕЩЁ РАЗ</button>
  `;
  overlay.classList.add('show');
  document.getElementById('gameOverlayWrap').classList.add('active');
}

// Swipe support
let touchStartX, touchStartY;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (Math.abs(dx) > 20) setDir(dx>0?1:-1, 0);
  } else {
    if (Math.abs(dy) > 20) setDir(0, dy>0?1:-1);
  }
}, {passive:true});

// Keyboard support
document.addEventListener('keydown', e => {
  if (['ArrowUp','w','W'].includes(e.key)) setDir(0,-1);
  else if (['ArrowDown','s','S'].includes(e.key)) setDir(0,1);
  else if (['ArrowLeft','a','A'].includes(e.key)) setDir(-1,0);
  else if (['ArrowRight','d','D'].includes(e.key)) setDir(1,0);
});
</script>
</body>
</html>
